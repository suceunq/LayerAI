appId: com.updatemanager.app
productName: Update Manager
copyright: Copyright (c) 2026

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - package.json
  - "!node_modules/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  artifactName: UpdateManager-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Update Manager
  uninstallDisplayName: Update Manager
  deleteAppDataOnUninstall: false

publish: null
