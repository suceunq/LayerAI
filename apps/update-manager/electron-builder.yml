appId: com.layerai.updatemanager
productName: LayerAI Update Manager
copyright: Copyright (c) 2026 LayerAI

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - package.json
  - "!node_modules/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  artifactName: LayerAI-UpdateManager-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: LayerAI Update Manager
  uninstallDisplayName: LayerAI Update Manager
  deleteAppDataOnUninstall: false

publish: null
